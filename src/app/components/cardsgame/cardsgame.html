<div class="game-container">
  <header class="game-header">
    <button class="back-btn" (click)='goBack()'>
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      EXIT
    </button>
    <div class="game-stats">
      <div class="stat-item">
        <span class="label">MOVES</span>
        <span class="value">{{ moves }}</span>
      </div>
      <div class="stat-item">
        <span class="label">TIME</span>
        <span class="value">{{ formatTime(timer) }}</span>
      </div>
    </div>
  </header>

  <div class="game-board" [ngClass]="gridClass">
    <div class="card" *ngFor="let card of cards" 
         [class.flipped]="card.isFlipped || card.isMatched" 
         [class.matched]="card.isMatched"
         (click)="flipCard(card)">
      <div class="card-inner">
        <div class="card-front">
          <div class="card-pattern"></div>
        </div>
        <div class="card-back">
          <span class="card-value">{{ card.value }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Win Modal -->
  <div class="win-overlay" *ngIf="gameWon">
    <div class="win-modal">
      <div class="win-icon">🏆</div>
      <h2>Victory!</h2>
      <p>Your cognitive limits have been shattered.</p>
      
      <div class="final-stats">
        <div class="f-stat">
          <span>Time</span>
          <strong>{{ formatTime(timer) }}</strong>
        </div>
        <div class="f-stat">
          <span>Moves</span>
          <strong>{{ moves }}</strong>
        </div>
      </div>

      <div class="modal-actions">
        <button class="restart-btn" (click)="restart()">Play Again</button>
        <button class="home-btn" (click)="goBack()">Home</button>
      </div>
    </div>
  </div>
</div>
